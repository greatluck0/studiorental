function normalizeName(name) {
  return name.replace(/\s+/g, " ").trim();
}

function parseApplications(text, type) {
  const blocks = text
    .split(/(?=\[장비대여 신청\])/g)
    .filter(block => block.includes("대여일시:"));

  return blocks.map((block, index) => {
    const nameMatch = block.match(/이\s*름:\s*(.+)/);
    const startMatch = block.match(/대여일시:\s*([0-9T:\-]+)/);
    const endMatch = block.match(/반납일시:\s*([0-9T:\-]+)/);

    const borrowerName = nameMatch
      ? nameMatch[1].trim()
      : type === "new"
        ? "신규 신청자"
        : `이름 미확인 ${index + 1}`;

    const items = {};
    const itemRegex = /^(.+?)\s*\((\d+)개\)/gm;
    let match;

    while ((match = itemRegex.exec(block)) !== null) {
      const itemName = normalizeName(match[1]);
      const qty = Number(match[2]);
      items[itemName] = (items[itemName] || 0) + qty;
    }

    return {
      id: `${type}-${index + 1}`,
      borrowerName,
      label: type === "new" ? `신규 신청: ${borrowerName}` : borrowerName,
      type,
      start: startMatch ? new Date(startMatch[1]) : null,
      end: endMatch ? new Date(endMatch[1]) : null,
      items,
      originalText: block.trim()
    };
  }).filter(app => app.start && app.end);
}

function formatDate(date) {
  return date.toLocaleString("ko-KR", {
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
}

function setDefaultRuleBaseDate() {
  const input = document.getElementById("ruleBaseDate");
  if (!input || input.value) return;

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");

  input.value = `${yyyy}-${mm}-${dd}`;
}

function toDateOnly(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function formatDateOnly(date) {
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function checkApplicationPeriodRule(newApp) {
  setDefaultRuleBaseDate();

  const baseInput = document.getElementById("ruleBaseDate");
  const baseDate = baseInput && baseInput.value
    ? toDateOnly(new Date(baseInput.value))
    : toDateOnly(new Date());

  const rentalDate = toDateOnly(newApp.start);
  const returnDate = toDateOnly(newApp.end);

  const oneDay = 1000 * 60 * 60 * 24;
  const daysUntilRental = Math.ceil((rentalDate - baseDate) / oneDay);
  const daysUntilReturn = Math.ceil((returnDate - baseDate) / oneDay);
  const rentalDuration = Math.ceil((returnDate - rentalDate) / oneDay) + 1;

  let message = "";
  let ok = false;

  if (rentalDate > returnDate) {
    message = "❗ 대여일은 반납일보다 앞서야 합니다.";
  } else if (daysUntilReturn < 0 || daysUntilRental < 0) {
    message = "⛔ 이미 지난 날짜입니다. 신청 불가";
  } else if (daysUntilRental < 3) {
    message = "⚠️ 대여일 기준 3일 전까지 신청해야 합니다. 신청 불가";
  } else if (daysUntilReturn > 10) {
    message = "⚠️ 반납일 기준 10일 전부터만 신청할 수 있습니다. 신청 불가";
  } else if (rentalDuration > 3) {
    message = "⚠️ 대여 기간은 최대 3일까지 가능합니다. 신청 불가";
  } else {
    message = "✅ 신청 가능 기간 규정을 준수했습니다.";
    ok = true;
  }

return `
  <div class="section">
    <h3>신청기간 준수 여부</h3>
    <p class="${ok ? "safe" : "danger"}" style="font-size:20px; margin-bottom:10px;">
      ${message}
    </p>

    ${makeTable(`
      <table>
        <thead>
          <tr>
            <th>항목</th>
            <th>값</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-label="항목">기준 날짜</td>
            <td data-label="값">${formatDateOnly(baseDate)}</td>
          </tr>
          <tr>
            <td data-label="항목">대여일</td>
            <td data-label="값">${formatDateOnly(rentalDate)}</td>
          </tr>
          <tr>
            <td data-label="항목">반납일</td>
            <td data-label="값">${formatDateOnly(returnDate)}</td>
          </tr>
<!--
          <tr>
            <td data-label="항목">대여 기간</td>
            <td data-label="값">${rentalDuration}일</td>
          </tr>
          <tr>
            <td data-label="항목">대여일까지 남은 기간</td>
            <td data-label="값">${daysUntilRental}일</td>
          </tr>
          <tr>
            <td data-label="항목">반납일까지 남은 기간</td>
            <td data-label="값">${daysUntilReturn}일</td>
          </tr>
--!>
        </tbody>
      </table>
<br><br>
    `)}
  </div>
`;
}

document.addEventListener("DOMContentLoaded", setDefaultRuleBaseDate);

function makeTable(html) {
  return `<div class="table-wrap">${html}</div>`;
}

function escapeHtml(text) {
  return text
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function createAdjustedApplicationText(originalText, newApp, conflictSummary) {
  const lines = originalText.split("\n");

  const adjustedLines = lines.map(line => {
    const match = line.match(/^(\s*)(.+?)\s*\((\d+)개\)(.*)$/);

    if (!match) return line;

    const indent = match[1];
    const originalItemName = match[2].trim();
    const originalQty = Number(match[3]);
    const normalizedOriginalName = normalizeName(originalItemName);

    const conflictEntry = Object.entries(conflictSummary).find(([conflictName]) => {
      return normalizeName(conflictName) === normalizedOriginalName;
    });

    if (!conflictEntry) return line;

    const [, data] = conflictEntry;
    const adjustedQty = Math.max(0, originalQty - data.maxShortage);

    return `${indent}${originalItemName} (${adjustedQty}개)  ← 수정사항`;
  });

  return adjustedLines.join("\n").trim();
}

function copyAdjustedText() {
  const textarea = document.getElementById("adjustedApplicationText");

  if (!textarea) {
    alert("복사할 수정 신청서가 없습니다.");
    return;
  }

  const text = textarea.value;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      alert("수정 신청서가 복사되었습니다.");
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const temp = document.createElement("textarea");
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
  alert("수정 신청서가 복사되었습니다.");
}

function toggleInventory() {
  const panel = document.getElementById("inventoryPanel");

  if (panel.style.display === "none" || panel.style.display === "") {
    panel.style.display = "block";
    renderInventory();
  } else {
    panel.style.display = "none";
  }
}

function renderInventory() {
  const list = document.getElementById("inventoryList");
  const searchInput = document.getElementById("inventorySearch");
  const search = searchInput ? searchInput.value.trim().toLowerCase() : "";

  const items = Object.entries(inventory)
    .filter(([name]) => name.toLowerCase().includes(search))
    .sort((a, b) => a[0].localeCompare(b[0], "ko"));

  if (items.length === 0) {
    list.innerHTML = `<p class="warn">검색 결과가 없습니다.</p>`;
    return;
  }

  list.innerHTML = makeTable(`
    <table>
      <thead>
        <tr>
          <th>장비명</th>
          <th>보유 수량</th>
        </tr>
      </thead>
      <tbody>
        ${items.map(([name, qty]) => `
          <tr>
            <td data-label="장비명">${name}</td>
            <td data-label="보유 수량"><b>${qty}</b>개</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `);
}

function checkRemainingInventoryByTime() {
  const existingText = document.getElementById("existingText").value;
  const remainingResult = document.getElementById("remainingResult");

  const startValue = document.getElementById("remainStart").value;
  const endValue = document.getElementById("remainEnd").value;

  if (!startValue || !endValue) {
    remainingResult.style.display = "block";
    remainingResult.innerHTML = `<p class="danger">잔여장비를 확인할 시작 시간과 종료 시간을 입력해 주세요.</p>`;
    return;
  }

  const checkStart = new Date(startValue);
  const checkEnd = new Date(endValue);

  if (checkStart >= checkEnd) {
    remainingResult.style.display = "block";
    remainingResult.innerHTML = `<p class="danger">종료 시간은 시작 시간보다 늦어야 합니다.</p>`;
    return;
  }

  const existingApps = parseApplications(existingText, "existing");

  const activeApps = existingApps.filter(app =>
    app.start < checkEnd && app.end > checkStart
  );

  const usedItems = {};

  activeApps.forEach(app => {
    Object.entries(app.items).forEach(([name, qty]) => {
      usedItems[name] = (usedItems[name] || 0) + qty;
    });
  });

  const rows = Object.entries(inventory).map(([name, stock]) => {
    const used = usedItems[name] || 0;
    const remaining = stock - used;

    let status = "safe";
    if (remaining < 0) status = "danger";
    else if (remaining === 0) status = "warn";

    return { name, stock, used, remaining, status };
  }).sort((a, b) => {
    const order = { danger: 0, warn: 1, safe: 2 };
    return order[a.status] - order[b.status];
  });

  let html = `<h2>선택 시간대 잔여장비 현황</h2>`;
  html += `<p><b>확인 시간:</b> ${formatDate(checkStart)} ~ ${formatDate(checkEnd)}</p>`;

  if (activeApps.length > 0) {
    html += `<p><b>해당 시간대 대여자:</b> ${activeApps.map(app => app.label).join(", ")}</p>`;
  } else {
    html += `<p class="safe"><b>해당 시간대에 겹치는 기존 신청이 없습니다.</b></p>`;
  }

  html += makeTable(`
    <table>
      <thead>
        <tr>
          <th>장비명</th>
          <th>보유 수량</th>
          <th>사용 중</th>
          <th>잔여 수량</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(row => {
          let statusText = "";

          if (row.status === "danger") {
            statusText = `<span class="danger">초과 ${Math.abs(row.remaining)}개</span>`;
          } else if (row.status === "warn") {
            statusText = `<span class="warn">잔여 없음</span>`;
          } else {
            statusText = `<span class="safe">대여 가능</span>`;
          }

          return `
            <tr>
              <td data-label="장비명">${row.name}</td>
              <td data-label="보유 수량">${row.stock}</td>
              <td data-label="사용 중">${row.used}</td>
              <td data-label="잔여 수량"><b>${row.remaining}</b></td>
              <td data-label="상태">${statusText}</td>
            </tr>
          `;
        }).join("")}
      </tbody>
    </table>
  `);

  remainingResult.style.display = "block";
  remainingResult.innerHTML = html;
}

function checkNewApplication() {
  const existingText = document.getElementById("existingText").value;
  const newText = document.getElementById("newText").value;
  const result = document.getElementById("result");

  const existingApps = parseApplications(existingText, "existing");
  const newApps = parseApplications(newText, "new");

  if (newApps.length !== 1) {
    result.innerHTML = `<p class="danger">신규 신청건은 반드시 1건만 입력해 주세요.</p>`;
    return;
  }

  const newApp = newApps[0];
  const allApps = [...existingApps, newApp];

  const timePoints = [];

  allApps.forEach(app => {
    if (app.end > newApp.start && app.start < newApp.end) {
      timePoints.push(app.start.getTime());
      timePoints.push(app.end.getTime());
    }
  });

  timePoints.push(newApp.start.getTime());
  timePoints.push(newApp.end.getTime());

  const sortedTimes = [...new Set(timePoints)]
    .sort((a, b) => a - b)
    .map(time => new Date(time))
    .filter(time => time >= newApp.start && time <= newApp.end);

  const segments = [];
  const conflictSummary = {};

  for (let i = 0; i < sortedTimes.length - 1; i++) {
    const segStart = sortedTimes[i];
    const segEnd = sortedTimes[i + 1];

    if (segStart >= segEnd) continue;

    const activeApps = allApps.filter(app =>
      app.start < segEnd && app.end > segStart
    );

    if (!activeApps.some(app => app.type === "new")) continue;

    const usedItems = {};

    activeApps.forEach(app => {
      Object.entries(app.items).forEach(([name, qty]) => {
        usedItems[name] = (usedItems[name] || 0) + qty;
      });
    });

    const rows = Object.entries(usedItems).map(([name, used]) => {
      const stock = inventory[name];
      const newQty = newApp.items[name] || 0;

      if (stock === undefined) {
        return {
          name,
          newQty,
          used,
          stock: "미등록",
          status: "unknown",
          shortage: "-"
        };
      }

      if (used > stock) {
        const shortage = used - stock;

        if (!conflictSummary[name]) {
          conflictSummary[name] = {
            stock,
            newQty,
            maxUsed: used,
            maxShortage: shortage,
            periods: []
          };
        } else {
          conflictSummary[name].maxUsed = Math.max(conflictSummary[name].maxUsed, used);
          conflictSummary[name].maxShortage = Math.max(conflictSummary[name].maxShortage, shortage);
        }

        conflictSummary[name].periods.push(
          `${formatDate(segStart)} ~ ${formatDate(segEnd)}`
        );

        return {
          name,
          newQty,
          used,
          stock,
          status: "danger",
          shortage
        };
      }

      if (used === stock) {
        return {
          name,
          newQty,
          used,
          stock,
          status: "warn",
          shortage: 0
        };
      }

      return {
        name,
        newQty,
        used,
        stock,
        status: "safe",
        shortage: 0
      };
    }).sort((a, b) => {
      const order = { danger: 0, warn: 1, unknown: 2, safe: 3 };
      return order[a.status] - order[b.status];
    });

    segments.push({
      start: segStart,
      end: segEnd,
      activeApps,
      rows
    });
  }

  const conflictItems = Object.entries(conflictSummary);
  const isApproved = conflictItems.length === 0;

  let html = "";

html += checkApplicationPeriodRule(newApp);

  if (isApproved) {
    html += `<h2 class="safe">장비 최종 판정: 신규 신청 승인 가능</h2>`;
    html += `<p>신규 신청 기간 전체를 시간대별로 나누어 검사한 결과, 보유 수량을 초과하는 장비가 없습니다.</p>`;
  } else {
    html += `<h2 class="danger">장비 최종 판정: 신규 신청 승인 불가</h2>`;
    html += `<p>신규 신청 기간 중 일부 시간대에서 학과 보유 수량을 초과합니다.</p>`;

    html += `<h3>초과 장비 요약</h3>`;

    html += makeTable(`
      <table>
        <thead>
          <tr>
            <th>장비명</th>
            <th>신규 신청 수량</th>
            <th>	신규 + 기존 수량</th>
            <th>보유 수량</th>
            <th>최대 부족 수량</th>
            <th>초과 발생 시간</th>
          </tr>
        </thead>
        <tbody>
          ${conflictItems.map(([name, data]) => `
            <tr>
              <td data-label="장비명">${name}</td>
              <td data-label="신규 신청 수량"><b>${data.newQty}</b></td>
              <td data-label="최대 사용 수량">${data.maxUsed}</td>
              <td data-label="보유 수량">${data.stock}</td>
              <td data-label="최대 부족 수량" class="danger">${data.maxShortage}개 부족</td>
              <td data-label="초과 발생 시간">${data.periods.join("<br>")}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `);

    const adjustedText = createAdjustedApplicationText(newText, newApp, conflictSummary);

    html += `
      <div class="section">
        <h3>부족 수량을 제외한 수정 신청서</h3>
        <button onclick="copyAdjustedText()">수정 신청서 복사</button>
        <textarea
          id="adjustedApplicationText"
          readonly
          style="width:100%; min-height:360px; padding:14px; font-size:14px; line-height:1.5;"
        >${escapeHtml(adjustedText)}</textarea>
      </div>
    `;
  }

  html += `<p><b>신규 신청 기간:</b> ${formatDate(newApp.start)} ~ ${formatDate(newApp.end)}</p>`;

  if (segments.length === 0) {
    html += `<p class="safe">신규 신청과 겹치는 기존 신청이 없습니다.</p>`;
  }

  html += `<div class="section"><h3>시간대별 상세 검사</h3></div>`;

  segments.forEach(seg => {
    const hasDanger = seg.rows.some(row => row.status === "danger");

    html += `
      <div class="section">
        <h3 class="${hasDanger ? "danger" : "safe"}">
          ${formatDate(seg.start)} ~ ${formatDate(seg.end)}
          ${hasDanger ? " / 초과 발생" : " / 정상"}
        </h3>
        <p><b>해당 구간 활성 신청:</b> ${seg.activeApps.map(app => app.label).join(", ")}</p>
    `;

    html += makeTable(`
      <table>
        <thead>
          <tr>
            <th>장비명</th>
            <th>신규 신청 수량</th>
            <th>신규 + 기존 수량</th>
            <th>보유 수량</th>
            <th>판정</th>
          </tr>
        </thead>
        <tbody>
          ${seg.rows.map(row => {
            let statusText = "";

            if (row.status === "danger") {
              statusText = `<span class="danger">초과 ${row.shortage}개 부족</span>`;
            } else if (row.status === "warn") {
              statusText = `<span class="warn">최대치 사용</span>`;
            } else if (row.status === "unknown") {
              statusText = `<span class="warn">보유목록 미등록</span>`;
            } else {
              statusText = `<span class="safe">정상</span>`;
            }

            return `
              <tr>
                <td data-label="장비명">${row.name}</td>
                <td data-label="신규 신청 수량">${row.newQty}</td>
                <td data-label="총 사용 수량">${row.used}</td>
                <td data-label="보유 수량">${row.stock}</td>
                <td data-label="판정">${statusText}</td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    `);

    html += `</div>`;
  });

  result.innerHTML = html;
}
</script>



</body></html>
